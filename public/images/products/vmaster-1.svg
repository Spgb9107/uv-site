<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="800" fill="url(#bg)" />
  <circle cx="400" cy="350" r="200" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3" />
  
  <!-- Pro kit icon - metal texture -->
  <rect x="320" y="260" width="160" height="140" rx="12" fill="#2a2a2a" stroke="#888" stroke-width="3" />
  <rect x="340" y="240" width="120" height="30" rx="8" fill="url(#accent)" opacity="0.9" />
  <circle cx="400" cy="345" r="40" fill="none" stroke="#888" stroke-width="2" />
  <circle cx="400" cy="345" r="25" fill="#1a1a2e" stroke="#888" stroke-width="2" />
  <line x1="400" y1="310" x2="400" y2="380" stroke="#888" stroke-width="2" />
  <line x1="365" y1="345" x2="435" y2="345" stroke="#888" stroke-width="2" />
  
  <text x="400" y="480" font-family="Arial" font-size="32" font-weight="bold" fill="url(#accent)" text-anchor="middle">USKEYVISION</text>
  <text x="400" y="520" font-family="Arial" font-size="24" fill="#888" text-anchor="middle">V-Master</text>
  <rect x="300" y="580" width="200" height="4" rx="2" fill="url(#accent)" />
</svg>
