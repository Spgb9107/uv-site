<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)" />
  
  <!-- Decorative circles -->
  <circle cx="400" cy="350" r="200" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3" />
  <circle cx="400" cy="350" r="160" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.2" />
  
  <!-- Camera icon -->
  <rect x="320" y="280" width="160" height="120" rx="12" fill="#2a2a2a" stroke="url(#accent)" stroke-width="3" />
  <circle cx="400" cy="340" r="35" fill="none" stroke="url(#accent)" stroke-width="3" />
  <circle cx="400" cy="340" r="20" fill="url(#accent)" opacity="0.8" />
  <rect x="450" y="290" width="25" height="15" rx="3" fill="url(#accent)" />
  
  <!-- Text -->
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#accent)" text-anchor="middle">USKEYVISION</text>
  <text x="400" y="520" font-family="Arial, sans-serif" font-size="24" fill="#888" text-anchor="middle">R01 Vlogging Kit</text>
  
  <!-- Bottom accent -->
  <rect x="300" y="580" width="200" height="4" rx="2" fill="url(#accent)" />
</svg>
